# Set update schedule for GitHub Actions

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      # check at 2am UTC
      time: "02:00"      
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: daily
      # check at 2am UTC
      time: "02:00"      
    open-pull-requests-limit: 10
    groups:
      fortawesome:
        applies-to: version-updates
        patterns:
          - "@fortawesome/*"
      tailwindcss:
        applies-to: version-updates
        patterns:
          - "@tailwindcss/*"
          - "tailwindcss"
